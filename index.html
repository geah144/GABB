<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GABB — Google Alerts But Better</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #00ff41;
      --green-dim: #00cc33;
      --green-faint: #003a0f;
      --green-mid: #00ff4133;
      --black: #000000;
      --dark: #050f05;
      --red: #ff3131;
      --amber: #ffb300;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--dark);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      cursor: none;
      overflow-x: hidden;
      position: relative;
    }

    /* CRT scanlines */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* CRT vignette */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 9998;
    }

    /* Custom cursor */
    #cursor {
      position: fixed;
      width: 18px;
      height: 18px;
      border: 2px solid var(--green);
      pointer-events: none;
      z-index: 10000;
      transform: translate(-50%, -50%);
      transition: width 0.1s, height 0.1s;
    }
    #cursor::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 4px;
      background: var(--green);
    }
    #cursor.clicking {
      width: 12px;
      height: 12px;
    }

    /* Main layout */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--green-dim);
      padding-bottom: 20px;
      margin-bottom: 32px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .logo {
      font-family: 'VT323', monospace;
      font-size: 52px;
      line-height: 1;
      text-shadow: 0 0 20px var(--green), 0 0 40px var(--green-dim);
      letter-spacing: 4px;
    }

    .logo span {
      color: var(--green-dim);
      font-size: 28px;
    }

    .status-bar {
      font-size: 11px;
      color: var(--green-dim);
      text-align: right;
      line-height: 1.8;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 5px;
      animation: blink 1.4s infinite;
    }

    .tagline {
      font-size: 12px;
      color: var(--green-dim);
      letter-spacing: 2px;
    }

    /* Search bar */
    .search-section {
      margin-bottom: 28px;
    }

    .search-label {
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 3px;
      margin-bottom: 8px;
      display: block;
    }

    .search-row {
      display: flex;
      gap: 8px;
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: 1px solid var(--green-dim);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input::placeholder {
      color: #004d15;
    }

    .search-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 10px var(--green-mid);
    }

    .search-btn {
      background: var(--green);
      color: var(--black);
      border: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      font-weight: bold;
      padding: 10px 20px;
      cursor: none;
      letter-spacing: 2px;
      transition: background 0.15s;
    }

    .search-btn:hover {
      background: #00ff80;
    }

    /* Keyword chips */
    .keywords-label {
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 3px;
      margin-bottom: 10px;
      display: block;
    }

    .keywords-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px;
    }

    .keyword-chip {
      border: 1px solid var(--green-dim);
      color: var(--green-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      padding: 6px 14px;
      cursor: none;
      letter-spacing: 1px;
      transition: all 0.15s;
      position: relative;
      background: transparent;
    }

    .keyword-chip:hover,
    .keyword-chip.active {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-mid);
      box-shadow: 0 0 8px var(--green-mid);
    }

    .keyword-chip.active::before {
      content: '▶ ';
      color: var(--green);
    }

    .keyword-chip.default-chip {
      border-color: var(--green-dim);
    }

    .keyword-chip .remove-btn {
      margin-left: 8px;
      color: var(--red);
      font-size: 11px;
      cursor: none;
      opacity: 0.6;
    }

    .keyword-chip .remove-btn:hover {
      opacity: 1;
    }

    /* Dashboard */
    .dashboard {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .dashboard.visible {
      display: block;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid var(--green-faint);
      padding-bottom: 12px;
      margin-bottom: 20px;
    }

    .dashboard-title {
      font-family: 'VT323', monospace;
      font-size: 32px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--green-dim);
    }

    .dashboard-title .keyword-display {
      color: var(--amber);
      text-shadow: 0 0 10px rgba(255,179,0,0.5);
    }

    .dashboard-meta {
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 1px;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-box {
      border: 1px solid var(--green-faint);
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-family: 'VT323', monospace;
      font-size: 36px;
      color: var(--green);
      display: block;
      line-height: 1;
    }

    .stat-value.up {
      color: var(--green);
    }

    .stat-value.alert {
      color: var(--red);
      animation: blink 1s infinite;
    }

    .stat-label {
      font-size: 10px;
      color: var(--green-dim);
      letter-spacing: 2px;
      margin-top: 4px;
      display: block;
    }

    /* Sentiment bar */
    .sentiment-section {
      margin-bottom: 28px;
      border: 1px solid var(--green-faint);
      padding: 14px;
    }

    .sentiment-title {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--green-dim);
      margin-bottom: 10px;
    }

    .sentiment-bar {
      display: flex;
      height: 8px;
      width: 100%;
      overflow: hidden;
    }

    .sentiment-pos {
      background: var(--green);
      transition: width 0.5s ease;
    }

    .sentiment-neu {
      background: var(--amber);
      transition: width 0.5s ease;
    }

    .sentiment-neg {
      background: var(--red);
      transition: width 0.5s ease;
    }

    .sentiment-legend {
      display: flex;
      gap: 20px;
      margin-top: 8px;
    }

    .legend-item {
      font-size: 10px;
      color: var(--green-dim);
      letter-spacing: 1px;
    }

    .legend-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin-right: 4px;
    }

    /* Article rows */
    .articles-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--green-dim);
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
    }

    .article-row {
      border-bottom: 1px solid var(--green-faint);
      padding: 12px 0;
      cursor: none;
      transition: background 0.15s;
    }

    .article-row:hover {
      background: rgba(0,255,65,0.03);
    }

    .article-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .article-headline {
      font-size: 14px;
      color: var(--green);
      flex: 1;
      margin-right: 16px;
      line-height: 1.4;
    }

    .article-headline:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .article-date {
      font-size: 10px;
      color: var(--green-dim);
      white-space: nowrap;
      letter-spacing: 1px;
    }

    .article-meta {
      font-size: 11px;
      color: var(--green-dim);
      margin-bottom: 6px;
    }

    .article-source {
      color: var(--amber);
      letter-spacing: 1px;
    }

    .article-snippet {
      font-size: 12px;
      color: #006620;
      line-height: 1.5;
      display: none;
      margin-top: 8px;
      padding: 10px;
      border-left: 2px solid var(--green-dim);
      background: rgba(0,255,65,0.02);
    }

    .article-snippet.open {
      display: block;
      animation: fadeIn 0.2s ease;
    }

    .article-ai-note {
      margin-top: 8px;
      padding: 8px;
      border: 1px solid var(--green-faint);
      font-size: 11px;
      color: var(--green-dim);
      line-height: 1.5;
    }

    .article-ai-note::before {
      content: 'GABB_AI > ';
      color: var(--green);
    }

    .expand-btn {
      font-size: 10px;
      color: var(--green-dim);
      cursor: none;
      letter-spacing: 1px;
      background: none;
      border: none;
      font-family: 'Share Tech Mono', monospace;
      padding: 0;
      margin-top: 4px;
    }

    .expand-btn:hover {
      color: var(--green);
    }

    /* Notable quote */
    .notable-quote {
      margin: 24px 0;
      padding: 16px;
      border: 1px solid var(--green-dim);
      position: relative;
    }

    .notable-quote::before {
      content: 'NOTABLE_SIGNAL';
      position: absolute;
      top: -8px;
      left: 12px;
      background: var(--dark);
      font-size: 10px;
      color: var(--amber);
      letter-spacing: 2px;
      padding: 0 6px;
    }

    .notable-quote p {
      font-size: 13px;
      color: var(--green-dim);
      line-height: 1.6;
      font-style: italic;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 0;
      color: var(--green-dim);
    }

    .empty-state .big-text {
      font-family: 'VT323', monospace;
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 12px;
      letter-spacing: 2px;
      opacity: 0.5;
    }

    /* Footer */
    footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid var(--green-faint);
      font-size: 10px;
      color: #003a12;
      letter-spacing: 2px;
      display: flex;
      justify-content: space-between;
    }

    /* Animations */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.7; }
      97% { opacity: 1; }
      98% { opacity: 0.4; }
      99% { opacity: 1; }
    }

    .container {
      animation: flicker 8s infinite;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--green-dim); }
  </style>
</head>
<body>

<div id="cursor"></div>

<div class="container">

  <header>
    <div class="header-top">
      <div>
        <div class="logo">GABB<span>.exe</span></div>
        <div class="tagline">// GOOGLE ALERTS BUT BETTER</div>
      </div>
      <div class="status-bar">
        <div><span class="status-dot"></span>SYSTEM ONLINE</div>
        <div id="clock"></div>
        <div>3 KEYWORDS TRACKED</div>
      </div>
    </div>
  </header>

  <!-- Search -->
  <div class="search-section">
    <span class="search-label">// ADD_KEYWORD</span>
    <div class="search-row">
      <input type="text" class="search-input" id="keywordInput" placeholder="enter keyword to track..." maxlength="40" />
      <button class="search-btn" onclick="addKeyword()">TRACK &gt;</button>
    </div>
  </div>

  <!-- Keywords -->
  <span class="keywords-label">// TRACKED_KEYWORDS</span>
  <div class="keywords-row" id="keywordsRow"></div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">

    <div class="dashboard-header">
      <div class="dashboard-title">MONITORING: <span class="keyword-display" id="activeKeywordDisplay"></span></div>
      <div class="dashboard-meta" id="dashboardMeta"></div>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow"></div>

    <!-- Sentiment -->
    <div class="sentiment-section">
      <div class="sentiment-title">// SENTIMENT_ANALYSIS</div>
      <div class="sentiment-bar" id="sentimentBar">
  <div class="sentiment-pos" style="width:0%"></div>
  <div class="sentiment-neu" style="width:0%"></div>
  <div class="sentiment-neg" style="width:0%"></div>
</div>
      <div class="sentiment-legend">
        <span class="legend-item"><span class="legend-dot" style="background:var(--green)"></span>POSITIVE <span id="posVal"></span></span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--amber)"></span>NEUTRAL <span id="neuVal"></span></span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--red)"></span>NEGATIVE <span id="negVal"></span></span>
      </div>
    </div>

    <!-- Notable quote -->
    <div class="notable-quote" id="notableQuote">
      <p id="notableQuoteText"></p>
    </div>

    <!-- Articles -->
    <div class="articles-label">
      <span>// RECENT_MENTIONS</span>
      <span id="articleCount"></span>
    </div>
    <div id="articlesList"></div>

  </div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState">
    <span class="big-text">&gt;_</span>
    <p>SELECT A KEYWORD TO BEGIN MONITORING</p>
  </div>

  <footer>
    <span>GABB v1.0.0 — OPEN SOURCE</span>
    <span>STUB MODE — LIVE API COMING SOON</span>
  </footer>

</div>

<script>
  // ── Cursor ──────────────────────────────────────────────
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
  document.addEventListener('mousedown', () => cursor.classList.add('clicking'));
  document.addEventListener('mouseup', () => cursor.classList.remove('clicking'));

  // ── Clock ────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── Stub data ────────────────────────────────────────────
  const STUB_DATA = {
    "AI regulation": {
      stats: { mentions: 47, change: "+12", sources: 18, alert: false },
      sentiment: { pos: 28, neu: 45, neg: 27 },
      notable: "A senior EU official described the new framework as 'a turning point for algorithmic accountability' — the strongest language yet from Brussels on enforcement timelines.",
      articles: [
        {
          headline: "EU AI Act enforcement body names first director amid industry pushback",
          source: "Reuters",
          date: "2h ago",
          snippet: "The newly formed European AI Office has appointed its first executive director, signaling a shift from policy drafting to active enforcement. Industry groups have raised concerns about compliance timelines.",
          ai: "Signals acceleration of EU enforcement posture. Worth watching for downstream effects on US tech companies operating in European markets."
        },
        {
          headline: "Senate subcommittee schedules hearings on foundation model liability",
          source: "The Verge",
          date: "5h ago",
          snippet: "Three major AI labs have been invited to testify before the Senate Commerce subcommittee in April. The hearings will focus on liability frameworks for outputs generated by large language models.",
          ai: "First substantive US legislative movement on LLM liability. Timing suggests pre-election positioning more than imminent legislation."
        },
        {
          headline: "China releases updated AI governance guidelines targeting generative models",
          source: "MIT Technology Review",
          date: "1d ago",
          snippet: "China's Cyberspace Administration released a revised set of guidelines for generative AI providers, expanding earlier rules to cover multimodal systems and real-time audio generation.",
          ai: "Regulatory divergence between US, EU, and China continues to widen. Companies with global products face genuine trilemma."
        },
        {
          headline: "OpenAI, Google, Anthropic sign voluntary safety commitments ahead of summit",
          source: "Financial Times",
          date: "2d ago",
          snippet: "Seven leading AI companies have agreed to a set of voluntary commitments ahead of next month's international AI safety summit, including pre-deployment red-teaming and incident reporting.",
          ai: "Voluntary commitments historically precede binding regulation. Pattern matches early internet self-regulation era."
        },
        {
          headline: "NIST AI Risk Management Framework sees first major update since launch",
          source: "Wired",
          date: "3d ago",
          snippet: "The National Institute of Standards and Technology has published version 1.1 of its AI Risk Management Framework, incorporating feedback from over 200 organizations and adding new guidance on generative AI.",
          ai: "NIST updates are a leading indicator of where federal procurement requirements will land. Enterprise AI teams should track."
        }
      ]
    },
    "Çatalhöyük": {
      stats: { mentions: 8, change: "+3", sources: 5, alert: false },
      sentiment: { pos: 72, neu: 21, neg: 7 },
      notable: "A new isotopic analysis of skeletal remains is challenging long-held assumptions about mobility and kinship at the site — described by one researcher as 'rewriting the social map of the Neolithic.'",
      articles: [
        {
          headline: "New isotopic study reveals surprising mobility patterns among Çatalhöyük inhabitants",
          source: "Journal of Archaeological Science",
          date: "3d ago",
          snippet: "Strontium isotope analysis of 63 individuals buried beneath house floors suggests a significant proportion were born outside the immediate region, complicating earlier models of sedentary community structure.",
          ai: "Major methodological shift — isotopic evidence is harder to contest than typological analysis. Likely to trigger reinterpretation of burial clustering data."
        },
        {
          headline: "Turkish heritage ministry approves expanded excavation zone for 2025 season",
          source: "Hurriyet Daily News",
          date: "1w ago",
          snippet: "The Ministry of Culture and Tourism has granted permits for excavation of the site's previously unexcavated eastern mound, which geophysical surveys suggest contains domestic structures predating the main occupation phase.",
          ai: "Eastern mound data could push occupation dates back significantly. Watch for announcements from the Stanford-led consortium in late summer."
        },
        {
          headline: "Digitization project makes Çatalhöyük archive publicly accessible for first time",
          source: "Archaeology Magazine",
          date: "2w ago",
          snippet: "Over 40,000 photographs, field notebooks, and artifact records from three decades of excavation are now available through an open-access portal, representing one of the largest archaeological digitization efforts in the Near East.",
          ai: "Good for the field. Open data tends to accelerate reanalysis and secondary publications — expect a wave of new papers drawing on this archive."
        }
      ]
    },
    "special projects": {
      stats: { mentions: 23, change: "+5", sources: 11, alert: true },
      sentiment: { pos: 61, neu: 31, neg: 8 },
      notable: "Three separate job listings this week used 'special projects' as the primary role title — all at Series A or B companies, all reporting directly to a founder. The pattern is worth watching.",
      articles: [
        {
          headline: "Why 'Head of Special Projects' is the hottest job title at early-stage startups",
          source: "TechCrunch",
          date: "1d ago",
          snippet: "A growing number of venture-backed startups are creating ambiguously titled roles designed to attract generalist problem-solvers who can operate across product, ops, and strategy without a fixed remit.",
          ai: "Validates the role category you're targeting. The ambiguity is the feature — companies hiring for this are signaling they don't know what they need yet."
        },
        {
          headline: "From marketing to product: the generalist's path into AI companies",
          source: "First Round Review",
          date: "4d ago",
          snippet: "First Round Capital profiled six operators who made lateral moves from marketing and business development roles into product and strategy positions at AI-native companies, identifying portfolio-of-work as the common thread.",
          ai: "Portfolio-of-work as hiring signal is exactly the AREADBHAR bet. This piece is worth reading in full."
        },
        {
          headline: "The case for hiring creative operators over pure technologists",
          source: "Lenny's Newsletter",
          date: "1w ago",
          snippet: "Several founders argue that early-stage companies benefit more from people who can move between domains than from specialists, particularly for roles adjacent to product and growth.",
          ai: "Supports the 'generalist who builds things' positioning. Consider bookmarking quotes for cover letter or About page."
        }
      ]
    }
  };

  // ── Default keywords ─────────────────────────────────────
  const DEFAULT_KEYWORDS = ["AI regulation", "Çatalhöyük", "special projects"];

  // ── State ─────────────────────────────────────────────────
  let keywords = [...DEFAULT_KEYWORDS];
  let userKeywords = JSON.parse(localStorage.getItem('gabb_keywords') || '[]');
  let allKeywords = [...DEFAULT_KEYWORDS, ...userKeywords.filter(k => !DEFAULT_KEYWORDS.includes(k))];
  let activeKeyword = null;

  // ── Render keywords ───────────────────────────────────────
  function renderKeywords() {
    const row = document.getElementById('keywordsRow');
    row.innerHTML = '';
    allKeywords.forEach(kw => {
      const chip = document.createElement('button');
      chip.className = 'keyword-chip' + (DEFAULT_KEYWORDS.includes(kw) ? ' default-chip' : '') + (kw === activeKeyword ? ' active' : '');
      chip.onclick = () => selectKeyword(kw);

      const label = document.createTextNode(kw);
      chip.appendChild(label);

      if (!DEFAULT_KEYWORDS.includes(kw)) {
        const rm = document.createElement('span');
        rm.className = 'remove-btn';
        rm.textContent = '[x]';
        rm.onclick = (e) => { e.stopPropagation(); removeKeyword(kw); };
        chip.appendChild(rm);
      }

      row.appendChild(chip);
    });

    // Update count in status bar
    document.querySelector('.status-bar div:last-child').textContent =
      allKeywords.length + ' KEYWORD' + (allKeywords.length !== 1 ? 'S' : '') + ' TRACKED';
  }

  // ── Add keyword ───────────────────────────────────────────
  function addKeyword() {
    const input = document.getElementById('keywordInput');
    const val = input.value.trim();
    if (!val || allKeywords.map(k => k.toLowerCase()).includes(val.toLowerCase())) {
      input.style.borderColor = 'var(--red)';
      setTimeout(() => input.style.borderColor = '', 800);
      return;
    }
    userKeywords.push(val);
    localStorage.setItem('gabb_keywords', JSON.stringify(userKeywords));
    allKeywords = [...DEFAULT_KEYWORDS, ...userKeywords.filter(k => !DEFAULT_KEYWORDS.includes(k))];
    renderKeywords();
    input.value = '';
    selectKeyword(val);
  }

  // ── Remove keyword ────────────────────────────────────────
  function removeKeyword(kw) {
    userKeywords = userKeywords.filter(k => k !== kw);
    localStorage.setItem('gabb_keywords', JSON.stringify(userKeywords));
    allKeywords = [...DEFAULT_KEYWORDS, ...userKeywords.filter(k => !DEFAULT_KEYWORDS.includes(k))];
    if (activeKeyword === kw) {
      activeKeyword = null;
      document.getElementById('dashboard').classList.remove('visible');
      document.getElementById('emptyState').style.display = 'block';
    }
    renderKeywords();
  }

  // ── Select keyword ────────────────────────────────────────
  function selectKeyword(kw) {
    activeKeyword = kw;
    renderKeywords();

    const data = STUB_DATA[kw] || generateGenericStub(kw);
    renderDashboard(kw, data);

    document.getElementById('dashboard').classList.add('visible');
    document.getElementById('emptyState').style.display = 'none';
  }

  // ── Generic stub for user-added keywords ─────────────────
  function generateGenericStub(kw) {
    return {
      stats: { mentions: Math.floor(Math.random() * 40) + 5, change: "+" + Math.floor(Math.random() * 10), sources: Math.floor(Math.random() * 15) + 3, alert: false },
      sentiment: { pos: 40, neu: 40, neg: 20 },
      notable: `Early signal detected for "${kw}." Live API connection will surface real mentions, source breakdown, and AI-generated briefing. Stub mode active.`,
      articles: [
        {
          headline: `Connect live API to see real mentions of "${kw}"`,
          source: "GABB",
          date: "now",
          snippet: "This is stub data. When the NewsAPI + Claude API are connected, this row will show a real article mentioning your keyword, with source, date, and an AI-generated signal note.",
          ai: "Live intelligence will appear here once API keys are configured."
        }
      ]
    };
  }

  // ── Render dashboard ──────────────────────────────────────
  function renderDashboard(kw, data) {
    document.getElementById('activeKeywordDisplay').textContent = '"' + kw + '"';
    document.getElementById('dashboardMeta').textContent =
      'LAST_UPDATED: ' + new Date().toISOString().substring(0, 16).replace('T', ' ') + ' UTC';

    // Stats
    const statsRow = document.getElementById('statsRow');
    statsRow.innerHTML = `
      <div class="stat-box">
        <span class="stat-value">${data.stats.mentions}</span>
        <span class="stat-label">MENTIONS_7D</span>
      </div>
      <div class="stat-box">
        <span class="stat-value up">${data.stats.change}</span>
        <span class="stat-label">VS_PREV_WEEK</span>
      </div>
      <div class="stat-box">
        <span class="stat-value">${data.stats.sources}</span>
        <span class="stat-label">UNIQUE_SOURCES</span>
      </div>
      <div class="stat-box">
        <span class="stat-value ${data.stats.alert ? 'alert' : ''}">${data.stats.alert ? '!' : '—'}</span>
        <span class="stat-label">SPIKE_ALERT</span>
      </div>
    `;

    // Sentiment
    document.querySelector('.sentiment-pos').style.width = data.sentiment.pos + '%';
    document.querySelector('.sentiment-neu').style.width = data.sentiment.neu + '%';
    document.querySelector('.sentiment-neg').style.width = data.sentiment.neg + '%';
    document.getElementById('posVal').textContent = data.sentiment.pos + '%';
    document.getElementById('neuVal').textContent = data.sentiment.neu + '%';
    document.getElementById('negVal').textContent = data.sentiment.neg + '%';

    // Notable quote
    document.getElementById('notableQuoteText').textContent = data.notable;

    // Articles
    const list = document.getElementById('articlesList');
    list.innerHTML = '';
    document.getElementById('articleCount').textContent = data.articles.length + ' RESULTS';

    data.articles.forEach((art, i) => {
      const row = document.createElement('div');
      row.className = 'article-row';
      row.innerHTML = `
        <div class="article-top">
          <div class="article-headline">${art.headline}</div>
          <div class="article-date">${art.date}</div>
        </div>
        <div class="article-meta">SOURCE: <span class="article-source">${art.source}</span></div>
        <button class="expand-btn" onclick="toggleSnippet(${i})">[ + EXPAND ]</button>
        <div class="article-snippet" id="snippet-${i}">
          ${art.snippet}
          <div class="article-ai-note">${art.ai}</div>
        </div>
      `;
      list.appendChild(row);
    });
  }

  // ── Toggle snippet ────────────────────────────────────────
  function toggleSnippet(i) {
    const snippet = document.getElementById('snippet-' + i);
    const btn = snippet.previousElementSibling;
    const isOpen = snippet.classList.contains('open');
    snippet.classList.toggle('open');
    btn.textContent = isOpen ? '[ + EXPAND ]' : '[ — COLLAPSE ]';
  }

  // ── Enter key on search ───────────────────────────────────
  document.getElementById('keywordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addKeyword();
  });

  // ── Init ──────────────────────────────────────────────────
  renderKeywords();
</script>
</body>
</html>
